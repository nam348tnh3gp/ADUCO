name: PlatformIO CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        board:
          - uno
          - megaatmega2560
          - nano
          - leonardo
          - due
          - esp32dev
          - esp8266
          - teensy40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Copy all source files to src/
        run: |
          mkdir -p src
          cp *.ino *.h *.c *.cpp *.hpp src/ 2>/dev/null || true

      - name: Generate platformio.ini
        run: |
          cat > platformio.ini << 'EOF'
          [env:${{ matrix.board }}]
          platform = atmelavr
          board = ${{ matrix.board }}
          framework = arduino
          build_flags =
              -Ofast
              -funroll-loops
              -flto
              -Wall
              -Wno-unused-variable
              -Wno-unused-function
          upload_speed = 115200
          monitor_speed = 115200
          EOF

      - name: Build firmware
        run: pio run

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.board }}
          path: .pio/build/${{ matrix.board }}/firmware.hex
          if-no-files-found: ignore
