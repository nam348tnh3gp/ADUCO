name: PlatformIO CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        board:
          - uno
          - megaatmega2560

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Debug - Show full directory structure
        run: |
          echo "=== Current directory ==="
          pwd
          echo ""
          echo "=== Root contents ==="
          ls -la
          echo ""
          echo "=== Find all .ino files ==="
          find . -name "*.ino" -type f
          echo ""
          echo "=== Full tree ==="
          find . -type f | head -50

      - name: Prepare src directory
        run: |
          mkdir -p src
          
          # Tìm và copy tất cả file nguồn
          INO_FILE=$(find . -name "*.ino" -type f | head -1)
          echo "Found .ino file: $INO_FILE"
          
          if [ -n "$INO_FILE" ]; then
            cp "$INO_FILE" src/main.cpp
            echo "Copied $INO_FILE to src/main.cpp"
          else
            echo "ERROR: No .ino file found!"
            exit 1
          fi
          
          # Copy tất cả file .h (từ thư mục chứa .ino)
          INO_DIR=$(dirname "$INO_FILE")
          cp "$INO_DIR"/*.h src/ 2>/dev/null || true
          cp "$INO_DIR"/*.c src/ 2>/dev/null || true
          cp "$INO_DIR"/*.cpp src/ 2>/dev/null || true
          
          echo "=== Files in src/ ==="
          ls -la src/

      - name: Generate platformio.ini
        run: |
          cat > platformio.ini << 'EOF'
          [env:${{ matrix.board }}]
          platform = atmelavr
          board = ${{ matrix.board }}
          framework = arduino
          build_flags =
              -Ofast
              -funroll-loops
              -flto
              -Wall
              -Wno-unused-variable
              -Wno-unused-function
          upload_speed = 115200
          monitor_speed = 115200
          EOF

      - name: Build firmware
        run: pio run

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.board }}
          path: .pio/build/${{ matrix.board }}/firmware.hex
          if-no-files-found: ignore
