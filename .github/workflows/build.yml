name: PlatformIO CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        board:
          - uno
          - megaatmega2560

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Prepare src directory
        run: |
          mkdir -p src
          # Copy từ thư mục con ADUCO/ (repo checkout vào đây)
          cp ADUCO/*.h src/ 2>/dev/null || true
          cp ADUCO/*.c src/ 2>/dev/null || true
          cp ADUCO/*.cpp src/ 2>/dev/null || true
          # Chuyển .ino đầu tiên thành main.cpp
          for f in ADUCO/*.ino; do
            cp "$f" "src/main.cpp"
            break
          done
          echo "=== Files in src/ ==="
          ls -la src/

      - name: Debug directory structure
        run: |
          echo "Root:"
          ls -la
          echo ""
          echo "ADUCO/:"
          ls -la ADUCO/

      - name: Generate platformio.ini
        run: |
          cat > platformio.ini << 'EOF'
          [env:${{ matrix.board }}]
          platform = atmelavr
          board = ${{ matrix.board }}
          framework = arduino
          build_flags =
              -Ofast
              -funroll-loops
              -flto
              -Wall
              -Wno-unused-variable
              -Wno-unused-function
          upload_speed = 115200
          monitor_speed = 115200
          EOF

      - name: Build firmware
        run: pio run

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.board }}
          path: .pio/build/${{ matrix.board }}/firmware.hex
          if-no-files-found: ignore
